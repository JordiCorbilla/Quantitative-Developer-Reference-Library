<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="500" viewBox="0 0 1060 500" role="img" aria-labelledby="title desc">
  <title id="title">CVA ingredients and xVA stack</title>
  <desc id="desc">CVA calculation flow from exposure, probability of default, loss given default, and discounting into counterparty credit valuation adjustment and wider xVA stack.</desc>
  <defs><style>.bg{fill:#fbfcff}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2}.ex{fill:#eff6ff;stroke:#93c5fd}.pd{fill:#fff7ed;stroke:#fdba74}.lgd{fill:#f0fdf4;stroke:#86efac}.cva{fill:#fff1f2;stroke:#fda4af}.xva{fill:#f8fafc;stroke:#cbd5e1}.title{font:bold 26px Arial,sans-serif;fill:#0f172a}.h{font:bold 15px Arial,sans-serif;fill:#0f172a}.txt{font:12px Arial,sans-serif;fill:#334155}.small{font:11px Arial,sans-serif;fill:#475569}.formula{font:bold 16px Arial,sans-serif;fill:#0f172a}.arrow{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#475569"/></marker></defs>
  <rect class="bg" width="1060" height="500"/>
  <text class="title" x="40" y="52">CVA: Counterparty Default Loss Made Visible</text>
  <text class="small" x="40" y="76">CVA adjusts clean derivative value for expected loss if the counterparty defaults before maturity.</text>
  <rect class="box ex" x="55" y="135" width="210" height="125" rx="8"/><text class="h" x="82" y="168">Exposure / EAD</text><text class="txt" x="82" y="194">How much could be lost</text><text class="txt" x="82" y="212">if default occurs?</text><text class="small" x="82" y="242">depends on market moves,</text><text class="small" x="82" y="258">netting and collateral</text>
  <rect class="box pd" x="310" y="135" width="210" height="125" rx="8"/><text class="h" x="337" y="168">Default Probability</text><text class="txt" x="337" y="194">How likely is default</text><text class="txt" x="337" y="212">over each period?</text><text class="small" x="337" y="242">ratings, CDS spreads,</text><text class="small" x="337" y="258">hazard curves</text>
  <rect class="box lgd" x="565" y="135" width="210" height="125" rx="8"/><text class="h" x="592" y="168">LGD</text><text class="txt" x="592" y="194">What fraction is lost</text><text class="txt" x="592" y="212">after recovery?</text><text class="small" x="592" y="242">LGD = 1 - recovery</text>
  <rect class="box cva" x="820" y="135" width="200" height="125" rx="8"/><text class="h" x="865" y="168">CVA</text><text class="formula" x="842" y="199">sum EE x PD x LGD x DF</text><text class="small" x="842" y="232">credit-adjusted value</text>
  <path class="arrow" d="M265 198L310 198"/><path class="arrow" d="M520 198L565 198"/><path class="arrow" d="M775 198L820 198"/>
  <rect class="box xva" x="145" y="330" width="770" height="90" rx="8"/><text class="h" x="175" y="360">Wider xVA Stack</text><text class="txt" x="175" y="386">CVA: counterparty default. DVA: own default. FVA: funding. MVA: initial margin. KVA: capital.</text><text class="txt" x="175" y="406">Wrong-way risk appears when exposure increases as counterparty credit quality worsens.</text>
</svg>
