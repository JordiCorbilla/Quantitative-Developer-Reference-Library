<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="860" viewBox="0 0 1180 860" role="img" aria-labelledby="title desc">
  <title id="title">Options Greeks dashboard</title>
  <desc id="desc">Five-panel visual reference for delta, gamma, vega, theta, and rho with formulas and typical shapes for long vanilla options.</desc>
  <defs>
    <style>
      .bg{fill:#fbfcff}.card{fill:#fff;stroke:#d9e2ef;stroke-width:2}.axis{stroke:#334155;stroke-width:2}.grid{stroke:#e5edf7;stroke-width:1}.mark{stroke:#94a3b8;stroke-width:2;stroke-dasharray:5 5}.title{font:bold 30px Arial,sans-serif;fill:#0f172a}.subtitle{font:15px Arial,sans-serif;fill:#475569}.h{font:bold 19px Arial,sans-serif;fill:#0f172a}.formula{font:bold 16px Arial,sans-serif;fill:#1e293b}.txt{font:13px Arial,sans-serif;fill:#334155}.small{font:12px Arial,sans-serif;fill:#64748b}.blue{stroke:#2563eb;stroke-width:4;fill:none}.red{stroke:#dc2626;stroke-width:4;fill:none}.green{stroke:#16a34a;stroke-width:4;fill:none}.purple{stroke:#7c3aed;stroke-width:4;fill:none}.amber{stroke:#d97706;stroke-width:4;fill:none}.note{fill:#f8fafc;stroke:#e2e8f0}
    </style>
  </defs>
  <rect class="bg" width="1180" height="860"/>
  <text class="title" x="40" y="48">The Greeks: Key Option Price Sensitivities</text>
  <text class="subtitle" x="40" y="76">Greeks measure how option value changes when spot, volatility, time, or rates change. Shapes below are typical Black-Scholes long-vanilla intuition.</text>
  <rect class="note" x="880" y="28" width="250" height="62" rx="8"/>
  <text class="txt" x="898" y="54">Always state the shock convention:</text>
  <text class="small" x="898" y="74">sticky strike, sticky delta, unit scaling</text>

  <rect class="card" x="40" y="115" width="340" height="315" rx="10"/>
  <text class="h" x="62" y="148">1. Delta</text>
  <text class="formula" x="62" y="176">&#916; = &#8706;V / &#8706;S</text>
  <text class="txt" x="62" y="200">Hedge ratio to spot or forward.</text>
  <line class="axis" x1="78" y1="370" x2="330" y2="370"/><line class="axis" x1="95" y1="385" x2="95" y2="235"/>
  <line class="grid" x1="95" y1="300" x2="330" y2="300"/><line class="mark" x1="215" y1="235" x2="215" y2="385"/>
  <path class="blue" d="M95 360 C140 360,155 342,178 315 C194 295,210 276,235 258 C260 241,292 238,330 238"/>
  <path class="red" d="M95 238 C135 238,165 242,188 260 C210 278,225 306,245 330 C267 356,292 366,330 366"/>
  <text class="small" x="205" y="404">K</text><text class="small" x="318" y="388">S</text>
  <text class="small" x="248" y="252">call</text><text class="small" x="250" y="350">put</text>

  <rect class="card" x="420" y="115" width="340" height="315" rx="10"/>
  <text class="h" x="442" y="148">2. Gamma</text>
  <text class="formula" x="442" y="176">&#915; = &#8706;&#916; / &#8706;S = &#8706;&#178;V / &#8706;S&#178;</text>
  <text class="txt" x="442" y="200">Curvature and rebalance sensitivity.</text>
  <line class="axis" x1="458" y1="370" x2="710" y2="370"/><line class="axis" x1="475" y1="385" x2="475" y2="235"/>
  <line class="mark" x1="595" y1="235" x2="595" y2="385"/>
  <path class="green" d="M475 360 C515 360,535 330,557 287 C574 253,615 253,634 287 C657 329,676 360,710 360"/>
  <text class="small" x="585" y="404">K</text><text class="small" x="698" y="388">S</text>
  <text class="small" x="530" y="222">largest near ATM</text>

  <rect class="card" x="800" y="115" width="340" height="315" rx="10"/>
  <text class="h" x="822" y="148">3. Vega</text>
  <text class="formula" x="822" y="176">Vega = &#8706;V / &#8706;&#963;</text>
  <text class="txt" x="822" y="200">Exposure to implied volatility.</text>
  <line class="axis" x1="838" y1="370" x2="1090" y2="370"/><line class="axis" x1="855" y1="385" x2="855" y2="235"/>
  <line class="mark" x1="975" y1="235" x2="975" y2="385"/>
  <path class="purple" d="M855 360 C900 358,918 322,940 282 C958 249,993 249,1012 282 C1035 322,1054 358,1090 360"/>
  <text class="small" x="965" y="404">K</text><text class="small" x="1078" y="388">S</text>
  <text class="small" x="908" y="222">usually positive for long options</text>

  <rect class="card" x="205" y="470" width="340" height="315" rx="10"/>
  <text class="h" x="227" y="503">4. Theta</text>
  <text class="formula" x="227" y="531">&#920; = &#8706;V / &#8706;t</text>
  <text class="txt" x="227" y="555">Time passage, carry, and roll-down.</text>
  <line class="axis" x1="243" y1="725" x2="495" y2="725"/><line class="axis" x1="260" y1="740" x2="260" y2="590"/>
  <line class="grid" x1="260" y1="650" x2="495" y2="650"/><line class="mark" x1="380" y1="590" x2="380" y2="740"/>
  <path class="amber" d="M260 675 C300 676,324 694,350 715 C374 735,405 735,430 715 C455 694,474 676,495 675"/>
  <text class="small" x="370" y="759">K</text><text class="small" x="483" y="743">S</text>
  <text class="small" x="292" y="612">long ATM theta often most negative</text>

  <rect class="card" x="635" y="470" width="340" height="315" rx="10"/>
  <text class="h" x="657" y="503">5. Rho</text>
  <text class="formula" x="657" y="531">&#961; = &#8706;V / &#8706;r</text>
  <text class="txt" x="657" y="555">Sensitivity to interest rates.</text>
  <line class="axis" x1="673" y1="725" x2="925" y2="725"/><line class="axis" x1="690" y1="740" x2="690" y2="590"/>
  <path class="blue" d="M690 710 C745 694,805 672,925 615"/>
  <path class="red" d="M690 620 C750 642,815 670,925 712"/>
  <text class="small" x="913" y="743">r</text>
  <text class="small" x="830" y="626">call rho</text><text class="small" x="830" y="704">put rho</text>
  <text class="small" x="675" y="807">Rho grows with maturity; curve buckets are better for rates-heavy books.</text>
</svg>
