<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="470" viewBox="0 0 1060 470" role="img" aria-labelledby="title desc">
  <title id="title">VWAP and TWAP execution schedules</title>
  <desc id="desc">Comparison of TWAP equal time slicing, VWAP volume-curve slicing, POV participation, and implementation shortfall execution objectives.</desc>
  <defs>
    <style>
      .bg{fill:#fbfcff}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}.grid{stroke:#e2e8f0;stroke-width:1}.axis{stroke:#334155;stroke-width:2}.twap{fill:#93c5fd;stroke:#2563eb;stroke-width:2}.vwap{fill:#86efac;stroke:#16a34a;stroke-width:2}.pov{fill:#fdba74;stroke:#ea580c;stroke-width:2}.is{fill:#fca5a5;stroke:#dc2626;stroke-width:2}.title{font:bold 26px Arial,sans-serif;fill:#0f172a}.h{font:bold 15px Arial,sans-serif;fill:#0f172a}.txt{font:12px Arial,sans-serif;fill:#334155}.small{font:11px Arial,sans-serif;fill:#475569}
    </style>
  </defs>
  <rect class="bg" width="1060" height="470"/>
  <text class="title" x="40" y="50">Execution Algo Schedules: TWAP, VWAP, POV, IS</text>
  <text class="small" x="40" y="74">Different algorithms optimize different benchmarks. The schedule shape should match the execution objective.</text>

  <rect class="panel" x="55" y="105" width="470" height="280" rx="8"/>
  <text class="h" x="85" y="136">TWAP: equal quantity per time bucket</text>
  <line class="axis" x1="95" y1="340" x2="480" y2="340"/>
  <line class="axis" x1="95" y1="340" x2="95" y2="175"/>
  <text class="small" x="440" y="365">time</text>
  <text class="small" x="64" y="182">shares</text>
  <rect class="twap" x="125" y="275" width="38" height="65"/><rect class="twap" x="175" y="275" width="38" height="65"/><rect class="twap" x="225" y="275" width="38" height="65"/><rect class="twap" x="275" y="275" width="38" height="65"/><rect class="twap" x="325" y="275" width="38" height="65"/><rect class="twap" x="375" y="275" width="38" height="65"/>
  <text class="txt" x="95" y="410">Simple and transparent. Useful when volume forecasts are weak, but can trade too much in quiet periods and too little in liquid periods.</text>

  <rect class="panel" x="555" y="105" width="470" height="280" rx="8"/>
  <text class="h" x="585" y="136">VWAP: follow expected intraday volume curve</text>
  <line class="axis" x1="595" y1="340" x2="980" y2="340"/>
  <line class="axis" x1="595" y1="340" x2="595" y2="175"/>
  <text class="small" x="940" y="365">time</text>
  <text class="small" x="564" y="182">shares</text>
  <rect class="vwap" x="625" y="235" width="38" height="105"/><rect class="vwap" x="675" y="285" width="38" height="55"/><rect class="vwap" x="725" y="300" width="38" height="40"/><rect class="vwap" x="775" y="302" width="38" height="38"/><rect class="vwap" x="825" y="280" width="38" height="60"/><rect class="vwap" x="875" y="220" width="38" height="120"/>
  <text class="txt" x="595" y="410">Common benchmark algo. It reduces volume-profile risk, but performance depends on forecast quality and can be gamed around predictable schedules.</text>

  <rect class="panel" x="125" y="28" width="0" height="0"/>
  <rect class="pov" x="170" y="438" width="18" height="18"/><text class="small" x="196" y="452">POV: trade a fixed percentage of observed market volume</text>
  <rect class="is" x="565" y="438" width="18" height="18"/><text class="small" x="591" y="452">Implementation shortfall: front-load when urgency and alpha decay justify it</text>
</svg>
