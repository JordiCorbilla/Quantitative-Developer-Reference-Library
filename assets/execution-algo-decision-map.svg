<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="430" viewBox="0 0 1060 430" role="img" aria-labelledby="title desc">
  <title id="title">Execution algorithm decision map</title>
  <desc id="desc">Decision map for choosing TWAP, VWAP, POV, implementation shortfall, or limit execution based on urgency, volume forecast, alpha decay, and liquidity.</desc>
  <defs>
    <style>
      .bg{fill:#fbfcff}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2}.q{fill:#eff6ff;stroke:#93c5fd}.algo{fill:#f0fdf4;stroke:#86efac}.warn{fill:#fff7ed;stroke:#fdba74}.risk{fill:#fff1f2;stroke:#fda4af}.title{font:bold 26px Arial,sans-serif;fill:#0f172a}.h{font:bold 15px Arial,sans-serif;fill:#0f172a}.txt{font:12px Arial,sans-serif;fill:#334155}.small{font:11px Arial,sans-serif;fill:#475569}.arrow{stroke:#475569;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#475569"/>
    </marker>
  </defs>
  <rect class="bg" width="1060" height="430"/>
  <text class="title" x="40" y="52">Choosing an Execution Benchmark or Algo</text>
  <text class="small" x="40" y="76">Interview framing: start from objective, urgency, volume forecast quality, liquidity, and alpha decay.</text>

  <rect class="box q" x="55" y="150" width="190" height="105" rx="8"/>
  <text class="h" x="78" y="182">Execution Objective</text>
  <text class="txt" x="78" y="207">minimize benchmark slippage</text>
  <text class="txt" x="78" y="225">or capture short-lived alpha</text>

  <rect class="box q" x="310" y="80" width="190" height="95" rx="8"/>
  <text class="h" x="333" y="112">Good Volume Curve?</text>
  <text class="txt" x="333" y="137">stable intraday pattern</text>
  <text class="txt" x="333" y="155">liquid name</text>

  <rect class="box q" x="310" y="235" width="190" height="95" rx="8"/>
  <text class="h" x="333" y="267">High Urgency?</text>
  <text class="txt" x="333" y="292">alpha decays quickly</text>
  <text class="txt" x="333" y="310">risk of waiting is high</text>

  <rect class="box algo" x="565" y="55" width="175" height="85" rx="8"/>
  <text class="h" x="600" y="87">VWAP</text>
  <text class="txt" x="590" y="112">match volume curve</text>
  <text class="txt" x="590" y="130">benchmark execution</text>

  <rect class="box algo" x="565" y="160" width="175" height="85" rx="8"/>
  <text class="h" x="600" y="192">TWAP</text>
  <text class="txt" x="590" y="217">simple time slicing</text>
  <text class="txt" x="590" y="235">low forecast reliance</text>

  <rect class="box algo" x="565" y="265" width="175" height="85" rx="8"/>
  <text class="h" x="604" y="297">POV</text>
  <text class="txt" x="590" y="322">participate in real volume</text>
  <text class="txt" x="590" y="340">adaptive to liquidity</text>

  <rect class="box risk" x="805" y="110" width="200" height="95" rx="8"/>
  <text class="h" x="835" y="142">Implementation Shortfall</text>
  <text class="txt" x="830" y="167">front-load if alpha decay</text>
  <text class="txt" x="830" y="185">beats impact cost</text>

  <rect class="box warn" x="805" y="250" width="200" height="95" rx="8"/>
  <text class="h" x="850" y="282">Limit / Passive</text>
  <text class="txt" x="830" y="307">when price control matters</text>
  <text class="txt" x="830" y="325">accept fill uncertainty</text>

  <path class="arrow" d="M245 180L310 125"/>
  <path class="arrow" d="M245 225L310 280"/>
  <path class="arrow" d="M500 120L565 98"/>
  <path class="arrow" d="M500 150L565 202"/>
  <path class="arrow" d="M500 280L565 308"/>
  <path class="arrow" d="M740 98L805 150"/>
  <path class="arrow" d="M740 308L805 298"/>
</svg>
