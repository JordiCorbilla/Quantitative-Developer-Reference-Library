<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="500" viewBox="0 0 1060 500" role="img" aria-labelledby="title desc">
  <title id="title">Interest rate model family</title>
  <desc id="desc">Comparison of Vasicek, CIR, Hull-White, and Libor Market Model for fixed income pricing, risk, and derivatives.</desc>
  <defs><style>.bg{fill:#fbfcff}.card{fill:#fff;stroke:#cbd5e1;stroke-width:2}.v{fill:#eff6ff;stroke:#93c5fd}.c{fill:#f0fdf4;stroke:#86efac}.h{fill:#fff7ed;stroke:#fdba74}.l{fill:#fff1f2;stroke:#fda4af}.title{font:bold 26px Arial,sans-serif;fill:#0f172a}.head{font:bold 15px Arial,sans-serif;fill:#0f172a}.txt{font:12px Arial,sans-serif;fill:#334155}.small{font:11px Arial,sans-serif;fill:#475569}.formula{font:bold 14px Arial,sans-serif;fill:#0f172a}</style></defs>
  <rect class="bg" width="1060" height="500"/>
  <text class="title" x="40" y="52">Interest Rate Model Families</text>
  <text class="small" x="40" y="76">Model choice depends on product type: bond intuition, positivity, curve calibration, or full term-structure dynamics.</text>
  <rect class="card v" x="45" y="115" width="230" height="255" rx="8"/><text class="head" x="72" y="145">Vasicek</text><text class="formula" x="72" y="176">dr = a(b-r)dt + sigma dW</text><text class="txt" x="72" y="210">Mean-reverting short rate.</text><text class="txt" x="72" y="232">Analytically convenient.</text><text class="txt" x="72" y="254">Can produce negative rates.</text><text class="small" x="72" y="305">Used for: bond pricing intuition,</text><text class="small" x="72" y="323">forecasting, risk simulation.</text>
  <rect class="card c" x="300" y="115" width="230" height="255" rx="8"/><text class="head" x="327" y="145">CIR</text><text class="formula" x="327" y="176">dr = a(b-r)dt + sigma sqrt(r)dW</text><text class="txt" x="327" y="210">Mean reversion with state-</text><text class="txt" x="327" y="228">dependent volatility.</text><text class="txt" x="327" y="250">Helps preserve positivity.</text><text class="small" x="327" y="305">Used for: yield modelling,</text><text class="small" x="327" y="323">fixed-income risk.</text>
  <rect class="card h" x="555" y="115" width="230" height="255" rx="8"/><text class="head" x="582" y="145">Hull-White</text><text class="formula" x="582" y="176">dr = [theta(t)-a r]dt + sigma dW</text><text class="txt" x="582" y="210">Time-dependent drift fits</text><text class="txt" x="582" y="228">today's yield curve.</text><text class="txt" x="582" y="250">Useful for callable products.</text><text class="small" x="582" y="305">Used for: swaptions, Bermudans,</text><text class="small" x="582" y="323">caps/floors, callable bonds.</text>
  <rect class="card l" x="810" y="115" width="210" height="255" rx="8"/><text class="head" x="837" y="145">LMM / BGM</text><text class="formula" x="837" y="176">dL_i = ... + sigma_i L_i dW_i</text><text class="txt" x="837" y="210">Models forward rates directly.</text><text class="txt" x="837" y="232">Captures term-structure</text><text class="txt" x="837" y="250">volatility and correlation.</text><text class="small" x="837" y="305">Used for: complex rates exotics,</text><text class="small" x="837" y="323">swaption cubes, simulation.</text>
  <rect class="card" x="125" y="410" width="810" height="45" rx="8"/><text class="head" x="155" y="438">Production rule: match model to product, calibration instruments, quote convention, and risk-reporting purpose.</text>
</svg>
